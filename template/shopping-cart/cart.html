<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrinho</title>
    <link rel="stylesheet" href="../global/style.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-left">
        <img src="../imagens/header/Menu.png" alt="Menu" class="menu-icon" />
        <img src="../imagens/header/Logo.png" alt="Logo" class="logo" />
      </div>
      <nav>
        <ul>
          <li class="nav-item nav-home">
            <img
              src="../imagens/header/Home.png"
              alt="Home"
              class="nav-icon"
            /><span>Home</span>
          </li>
          <li class="nav-item nav-sobre">
            <img
              src="../imagens/header/Sobre Nós.png"
              alt="Sobre Nós"
              class="nav-icon"
            /><span>Sobre Nós</span>
          </li>
          <li class="nav-item nav-contato">
            <img
              src="../imagens/header/Contato.png"
              alt="Contato"
              class="nav-icon"
            /><span>Contato</span>
          </li>
          <li class="nav-item nav-cardapio">
            <img
              src="../imagens/header/Cardapio.png"
              alt="Cardápio"
              class="nav-icon"
            /><span>Cardápio</span>
          </li>
          <li class="nav-item nav-carrinho nav-ativo">
            <img
              src="../imagens/header/Carrinho.png"
              alt="Carrinho"
              class="nav-icon"
            /><span>Carrinho</span>
          </li>
        </ul>
      </nav>
    </header>

    <section class="carrinho-container">
      <div class="carrinho-box">
        <div class="carrinho-header">
          <div class="carrinho-col">Produto</div>
          <div class="carrinho-col">Preço Unitário</div>
          <div class="carrinho-col">Quantidade</div>
        </div>

        <div class="carrinho-itens"></div>
      </div>

      <div class="carrinho-subtotal">
        <span>Subtotal: <strong>R$ 0,00</strong></span>
      </div>

      <div class="carrinho-cupom">
        <label for="cupom-input" class="cupom-label"
          ><strong>Cupom de Desconto</strong></label
        >
        <div class="cupom-grupo">
          <input
            type="text"
            id="cupom-input"
            class="cupom-input"
            placeholder="Digite o cupom"
          />
          <button type="button" class="cupom-btn">Usar Cupom</button>
        </div>
      </div>

      <div class="carrinho-acoes">
        <button type="button" class="btn-finalizar">Finalizar compra</button>
        <button type="button" class="btn-cancelar-carrinho">Cancelar</button>
      </div>
    </section>

    <footer class="site-footer">
      <div class="footer-content">
        <div class="footer-title">Contatos</div>
        <div class="footer-label">Telefone</div>
        <div class="footer-card footer-phone-card">(19) 99999-9990</div>
        <div class="footer-newsletter-text">Assine já nosso newsletter:</div>
        <div class="footer-card footer-newsletter-card"></div>
        <div class="footer-label footer-feedback-label">Feedback</div>
        <textarea
          class="footer-card footer-feedback-card footer-feedback-input"
          placeholder=""
        ></textarea>
        <button type="submit" class="footer-submit">Submit</button>
      </div>
      <div class="footer-right">
        <div class="social-icons">
          <img
            src="../imagens/rodape/Instagram.png"
            alt="Instagram"
            class="footer-icon footer-instagram"
          />
          <img
            src="../imagens/rodape/Facebook.png"
            alt="Facebook"
            class="footer-icon footer-facebook"
          />
          <img
            src="../imagens/rodape/Linkedin.png"
            alt="LinkedIn"
            class="footer-icon footer-linkedin"
          />
          <img
            src="../imagens/rodape/Spotify.png"
            alt="Spotify"
            class="footer-icon footer-spotify"
          />
        </div>

        <div class="footer-badges">
          <img
            src="../imagens/rodape/100qualidade.png"
            alt="100 qualidade"
            class="footer-badge"
          />
          <img
            src="../imagens/rodape/Natural.png"
            alt="Natural"
            class="footer-badge"
          />
          <img
            src="../imagens/rodape/google.png"
            alt="Google"
            class="footer-badge"
          />
        </div>
      </div>
    </footer>
  </body>
</html>
