<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cardápio - Bebidas</title>
    <link rel="stylesheet" href="../global/style.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-left">
        <img src="../imagens/header/Menu.png" alt="Menu" class="menu-icon" />
        <img src="../imagens/header/Logo.png" alt="Logo" class="logo" />
      </div>
      <nav>
        <ul>
          <li class="nav-item nav-home">
            <img src="../imagens/header/Home.png" alt="Home" class="nav-icon" /><span
              >Home</span
            >
          </li>
          <li class="nav-item nav-sobre">
            <img
              src="../imagens/header/Sobre Nós.png"
              alt="Sobre Nós"
              class="nav-icon"
            /><span>Sobre Nós</span>
          </li>
          <li class="nav-item nav-contato">
            <img
              src="../imagens/header/Contato.png"
              alt="Contato"
              class="nav-icon"
            /><span>Contato</span>
          </li>
          <li class="nav-item nav-cardapio nav-ativo">
            <img
              src="../imagens/header/Cardapio.png"
              alt="Cardápio"
              class="nav-icon"
            /><span>Cardápio</span>
          </li>
          <li class="nav-item nav-carrinho">
            <img
              src="../imagens/header/Carrinho.png"
              alt="Carrinho"
              class="nav-icon"
            /><span>Carrinho</span>
          </li>
        </ul>
      </nav>
    </header>

    <header class="secondary-header">
      <nav>
        <div class="secondary-row">
          <div class="secondary-item">
            <img
              src="../imagens/header/Hot Dog.png"
              alt="Salsichas"
              class="secondary-icon"
            />
            <span>Cachorro Quente</span>
          </div>
          <div class="secondary-item">
            <img
              src="../imagens/header/Bebida.png"
              alt="Bebidas"
              class="secondary-icon"
            />
            <span>Bebidas</span>
          </div>
          <div class="secondary-item">
            <img
              src="../imagens/header/Sobremesa.png"
              alt="Sobremesa"
              class="secondary-icon"
            />
            <span>Sobremesa</span>
          </div>
        </div>
      </nav>
      <div class="timeline-container">
        <div class="timeline-bar">
          <div class="timeline-progress timeline-progress-completo"></div>
          <div class="timeline-progress timeline-progress-andamento">
            <span class="timeline-label">Em andamento</span>
          </div>
        </div>
      </div>
    </header>

    <section class="cardapio-ingredientes">
      <div class="container-cardapio">
        <h2 class="titulo-secao-menu">Sucos</h2>
        <div class="linha-menu">
          <figure class="cartao-produto cartao-bebida">
            <img
              src="../imagens/bebidas/SucoDeLaranja.png"
              alt="Suco de Laranja"
              class="imagem-produto"
            />
            <img src="../imagens/icones/Adicionar.png" alt="Adicionar" class="icone-adicionar" />
            <figcaption class="rotulo-produto rotulo-bebida">Suco de Laranja</figcaption>
            <div class="preco-bebida">R$ 7,00</div>
          </figure>
          <figure class="cartao-produto cartao-bebida">
            <img
              src="../imagens/bebidas/SucoDeLimao.png"
              alt="Suco de Limão"
              class="imagem-produto"
            />
            <img src="../imagens/icones/Adicionar.png" alt="Adicionar" class="icone-adicionar" />
            <figcaption class="rotulo-produto rotulo-bebida">Suco de Limão</figcaption>
            <div class="preco-bebida">R$ 7,00</div>
          </figure>
          <figure class="cartao-produto cartao-bebida">
            <img
              src="../imagens/bebidas/SucodeAbacaxi.png"
              alt="Suco de Abacaxi"
              class="imagem-produto"
            />
            <img src="../imagens/icones/Adicionar.png" alt="Adicionar" class="icone-adicionar" />
            <figcaption class="rotulo-produto rotulo-bebida">Suco de Abacaxi</figcaption>
            <div class="preco-bebida">R$ 7,00</div>
          </figure>
          <figure class="cartao-produto cartao-bebida">
            <img
              src="../imagens/bebidas/SucoDeMorango.png"
              alt="Suco de Morango"
              class="imagem-produto"
            />
            <img src="../imagens/icones/Adicionar.png" alt="Adicionar" class="icone-adicionar" />
            <figcaption class="rotulo-produto rotulo-bebida">Suco de Morango</figcaption>
            <div class="preco-bebida">R$ 7,00</div>
          </figure>
        </div>

        <h2 class="titulo-secao-menu">Refrigerantes</h2>
        <div class="linha-menu">
          <figure class="cartao-produto cartao-bebida">
            <img
              src="../imagens/bebidas/CocaCola.png"
              alt="Coca Cola"
              class="imagem-produto"
            />
            <img src="../imagens/icones/Adicionar.png" alt="Adicionar" class="icone-adicionar" />
            <figcaption class="rotulo-produto rotulo-bebida">Coca Cola</figcaption>
            <div class="opcoes-bebida">
              <label class="opcao-radio">
                <input type="radio" name="coca-cola" value="sem-acucar" />
                <span>S/Açúcar</span>
              </label>
              <label class="opcao-radio">
                <input type="radio" name="coca-cola" value="com-acucar" />
                <span>C/Açúcar</span>
              </label>
            </div>
            <div class="preco-bebida">R$ 6,00</div>
          </figure>
          <figure class="cartao-produto cartao-bebida">
            <img
              src="../imagens/bebidas/Fanta.png"
              alt="Fanta Laranja"
              class="imagem-produto"
            />
            <img src="../imagens/icones/Adicionar.png" alt="Adicionar" class="icone-adicionar" />
            <figcaption class="rotulo-produto rotulo-bebida">Fanta Laranja</figcaption>
            <div class="preco-bebida">R$ 6,00</div>
          </figure>
          <figure class="cartao-produto cartao-bebida">
            <img
              src="../imagens/bebidas/Guarana.png"
              alt="Guaraná"
              class="imagem-produto"
            />
            <img src="../imagens/icones/Adicionar.png" alt="Adicionar" class="icone-adicionar" />
            <figcaption class="rotulo-produto rotulo-bebida">Guaraná</figcaption>
            <div class="preco-bebida">R$ 6,00</div>
          </figure>
          <figure class="cartao-produto cartao-bebida">
            <img
              src="../imagens/bebidas/FantaUva.png"
              alt="Fanta Uva"
              class="imagem-produto"
            />
            <img src="../imagens/icones/Adicionar.png" alt="Adicionar" class="icone-adicionar" />
            <figcaption class="rotulo-produto rotulo-bebida">Fanta Uva</figcaption>
            <div class="preco-bebida">R$ 6,00</div>
          </figure>
        </div>

        <h2 class="titulo-secao-menu">Cervejas Artesanais</h2>
        <div class="linha-menu">
          <figure class="cartao-produto cartao-bebida">
            <img
              src="../imagens/bebidas/Pielsen.png"
              alt="Pielsen"
              class="imagem-produto"
            />
            <img src="../imagens/icones/Adicionar.png" alt="Adicionar" class="icone-adicionar" />
            <figcaption class="rotulo-produto rotulo-bebida">Pielsen</figcaption>
            <div class="preco-bebida">R$ 15,00</div>
          </figure>
          <figure class="cartao-produto cartao-bebida">
            <img
              src="../imagens/bebidas/PalePale.png"
              alt="Pale Ale"
              class="imagem-produto"
            />
            <img src="../imagens/icones/Adicionar.png" alt="Adicionar" class="icone-adicionar" />
            <figcaption class="rotulo-produto rotulo-bebida">Pale Ale</figcaption>
            <div class="preco-bebida">R$ 15,00</div>
          </figure>
          <figure class="cartao-produto cartao-bebida">
            <img
              src="../imagens/bebidas/Weiss.png"
              alt="Weiss"
              class="imagem-produto"
            />
            <img src="../imagens/icones/Adicionar.png" alt="Adicionar" class="icone-adicionar" />
            <figcaption class="rotulo-produto rotulo-bebida">Weiss</figcaption>
            <div class="preco-bebida">R$ 15,00</div>
          </figure>
          <figure class="cartao-produto cartao-bebida">
            <img
              src="../imagens/bebidas/Stout.png"
              alt="Stout"
              class="imagem-produto"
            />
            <img src="../imagens/icones/Adicionar.png" alt="Adicionar" class="icone-adicionar" />
            <figcaption class="rotulo-produto rotulo-bebida">Stout</figcaption>
            <div class="preco-bebida">R$ 15,00</div>
          </figure>
        </div>
      </div>

      <div class="acoes-cardapio">
        <div class="item-acao">
          <a href="../cardapio-ingredientes/cardapio-ingredientes.html" style="display: flex; align-items: center; text-decoration: none;">
            <img src="../imagens/icones/SetaVoltar.png" alt="Voltar" class="icone-acao" />
            <button type="button" class="link-acao">Voltar</button>
          </a>
        </div>

        <div class="item-acao">
          <a href="../cardapio-sobremesas/cardapio-sobremesas.html" style="display: flex; align-items: center; text-decoration: none;">
            <img src="../imagens/icones/seta.png" alt="Seta" class="icone-acao" />
            <button type="button" class="link-acao">Ir para o Próximo</button>
          </a>
        </div>

        <div class="item-acao">
          <img src="../imagens/icones/excluir.png" alt="Excluir" class="icone-acao" />
          <button type="button" class="link-acao">Desfazer Tudo</button>
        </div>

        <div class="item-acao">
          <button type="button" class="link-acao link-cancelar">
            Cancelar
          </button>
        </div>
      </div>
    </section>

    <footer class="site-footer">
      <div class="footer-content">
        <div class="footer-title">Contatos</div>
        <div class="footer-label">Telefone</div>
        <div class="footer-card footer-phone-card">(19) 99999-9990</div>
        <div class="footer-newsletter-text">Assine já nosso newsletter:</div>
        <div class="footer-card footer-newsletter-card"></div>
        <div class="footer-label footer-feedback-label">Feedback</div>
        <textarea
          class="footer-card footer-feedback-card footer-feedback-input"
          placeholder=""
        ></textarea>
        <button type="submit" class="footer-submit">Submit</button>
      </div>
      <div class="footer-right">
        <div class="social-icons">
          <img
            src="../imagens/rodape/Instagram.png"
            alt="Instagram"
            class="footer-icon footer-instagram"
          />
          <img
            src="../imagens/rodape/Facebook.png"
            alt="Facebook"
            class="footer-icon footer-facebook"
          />
          <img
            src="../imagens/rodape/Linkedin.png"
            alt="LinkedIn"
            class="footer-icon footer-linkedin"
          />
          <img
            src="../imagens/rodape/Spotify.png"
            alt="Spotify"
            class="footer-icon footer-spotify"
          />
        </div>

        <div class="footer-badges">
          <img
            src="../imagens/rodape/100qualidade.png"
            alt="100 qualidade"
            class="footer-badge"
          />
          <img src="../imagens/rodape/Natural.png" alt="Natural" class="footer-badge" />
          <img src="../imagens/rodape/google.png" alt="Google" class="footer-badge" />
        </div>
      </div>
    </footer>
  </body>
</html>
